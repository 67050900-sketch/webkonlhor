<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Planner | IoTE KMITL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Tenor+Sans&family=Prompt:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #ff6b00; 
            --accent-soft: #ff8533;
            --border: rgba(0, 0, 0, 0.08);
            --dim-text: #666;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', 'Prompt', sans-serif; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Background Animation (ธีมเดียวกับทุกหน้า) --- */
        .bg-visual {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 0% 0%, rgba(255, 107, 0, 0.05) 0%, transparent 35%),
                        radial-gradient(circle at 100% 100%, rgba(255, 107, 0, 0.05) 0%, transparent 35%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }
        @keyframes bgShift { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        /* --- Navbar (เหมือนหน้าหลักและหน้า Hub) --- */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 1.5rem 5%; display: flex; justify-content: space-between; 
            align-items: center; backdrop-filter: blur(15px); 
            background: rgba(255, 255, 255, 0.8); border-bottom: 1px solid var(--border); 
        }
        .logo { font-family: 'Tenor Sans', sans-serif; font-size: 1.4rem; font-weight: bold; letter-spacing: 3px; color: #000; text-decoration: none; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; list-style: none; gap: 2.5rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dim-text); font-size: 0.75rem; letter-spacing: 2px; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }
        .nav-btn { border: 1.5px solid var(--accent); padding: 0.5rem 1.5rem; border-radius: 50px; color: var(--accent) !important; }

        /* --- Main Calculator Container --- */
        .main-content {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 5% 60px 5%;
        }

        .calc-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 650px;
            padding: 50px;
            animation: fadeInUp 1s ease forwards;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Tenor Sans'; font-size: 2.8rem; letter-spacing: -1px; margin-bottom: 10px; }
        .header h1 span { -webkit-text-stroke: 1px #000; -webkit-text-fill-color: transparent; }
        .label { color: var(--accent); font-weight: 800; font-size: 0.7rem; letter-spacing: 5px; display: block; margin-bottom: 10px; }

        /* --- Input Rows --- */
        .course-row {
            display: flex; gap: 15px; margin-bottom: 15px; align-items: center;
            background: rgba(255, 255, 255, 0.5); padding: 5px 15px; border-radius: 4px;
            transition: 0.3s; border: 1px solid transparent;
        }
        .course-row:hover { border-color: var(--accent); background: #fff; }

        .course-row input, .course-row select {
            border: none; background: transparent; padding: 12px 5px;
            font-family: 'Prompt'; font-size: 0.9rem; outline: none; color: var(--text);
        }
        .course-row input::placeholder { color: #ccc; }

        /* ลบแถวด้วยกากบาท */
        .remove-trigger {
            cursor: pointer; color: #ccc; font-size: 1.4rem; padding: 0 5px;
            transition: 0.3s; line-height: 1;
        }
        .remove-trigger:hover { color: var(--accent); transform: scale(1.2) rotate(90deg); }

        .add-btn {
            width: 100%; padding: 15px; margin-top: 20px;
            border: 1px dashed var(--accent); background: none;
            color: var(--accent); cursor: pointer; font-weight: 800;
            font-family: 'Prompt'; letter-spacing: 1px; transition: 0.3s;
        }
        .add-btn:hover { background: rgba(255, 107, 0, 0.05); border-style: solid; }

        /* --- Result --- */
        .result-box {
            margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border);
            text-align: center;
        }
        .gpa-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 3px; color: var(--dim-text); margin-bottom: 10px; display: block; }
        #total-gpa { font-family: 'JetBrains Mono'; font-size: 4.5rem; font-weight: 800; line-height: 1; color: var(--text); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .calc-card { padding: 30px 15px; }
            .course-row { gap: 5px; padding: 5px 10px; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="bg-visual"></div>
    <canvas id="starfield" style="position:fixed; top:0; left:0; z-index:-1;"></canvas>

    <nav>
        <a href="index.html" class="logo">IoTE <span>KMITL</span></a>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="admission.html" class="nav-btn">ADMISSION</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="calc-card">
            <div class="header">
                <span class="label">ENGINEERING TOOL</span>
                <h1>GPA <span>PLANNER</span></h1>
            </div>

            <div id="course-container">
                </div>

            <button class="add-btn" onclick="addRow()">+ ADD NEW COURSE</button>

            <div class="result-box">
                <span class="gpa-label">ESTIMATED SEMESTER GPA</span>
                <h1 id="total-gpa">0.00</h1>
            </div>
        </div>
    </main>

    <script>
        // Starfield DNA (ธีมเดียวกับหน้า Hub)
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Star {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.2; this.speed = Math.random() * 0.15; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.y = 0; }
            draw() { ctx.fillStyle = 'rgba(255, 107, 0, 0.2)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        function init() { stars = []; for (let i = 0; i < 80; i++) stars.push(new Star()); }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); stars.forEach(s => { s.update(); s.draw(); }); requestAnimationFrame(animate); }
        window.addEventListener('resize', () => { resize(); init(); });
        resize(); init(); animate();

        // GPA Calculation Logic
        window.onload = () => { for(let i=0; i<3; i++) addRow(); }

        function addRow() {
            const container = document.getElementById('course-container');
            const div = document.createElement('div');
            div.className = 'course-row';
            div.innerHTML = `
                <input type="text" placeholder="Course Name" style="flex: 2;">
                <input type="number" placeholder="Cr." class="cr" style="flex: 0.6;" oninput="calc()">
                <select class="gr" style="flex: 0.8;" onchange="calc()">
                    <option value="4">A</option><option value="3.5">B+</option>
                    <option value="3">B</option><option value="2.5">C+</option>
                    <option value="2">C</option><option value="1.5">D+</option>
                    <option value="1">D</option><option value="0">F</option>
                </select>
                <div class="remove-trigger" onclick="this.parentElement.remove(); calc();">×</div>
            `;
            container.appendChild(div);
            calc();
        }

        function calc() {
            const crs = document.querySelectorAll('.cr');
            const grs = document.querySelectorAll('.gr');
            let totalP = 0, totalC = 0;
            crs.forEach((c, i) => {
                const val = parseFloat(c.value) || 0;
                totalP += val * parseFloat(grs[i].value);
                totalC += val;
            });
            const res = totalC > 0 ? (totalP / totalC).toFixed(2) : "0.00";
            document.getElementById('total-gpa').innerText = res;
        }
    </script>
</body>
</html>
